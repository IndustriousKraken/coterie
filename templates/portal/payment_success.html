{% extends "layouts/base.html" %}

{% block title %}Payment Successful - Coterie{% endblock %}

{% block content %}
<div class="px-4 py-12">
    <div class="max-w-md mx-auto text-center">
        <div class="bg-white rounded-lg shadow-sm p-8">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
                <svg class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Payment Successful</h1>
            <p class="text-gray-600 mb-6">Your membership dues have been recorded. Thank you!</p>
            <a href="/portal/payments"
               class="inline-block px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">
                View Payment History
            </a>
        </div>
    </div>
</div>
{% endblock %}
