<div class="space-y-4">
    <div class="p-4 bg-green-50 border border-green-200 rounded-md">
        <h3 class="text-sm font-semibold text-green-900">{{ heading }}</h3>
        <p class="mt-1 text-sm text-green-800">{{ subheading }}</p>
    </div>

    <ul class="grid grid-cols-2 gap-2 font-mono text-sm">
    {% for code in codes %}
        <li class="px-3 py-2 bg-gray-100 rounded text-center select-all">{{ code }}</li>
    {% endfor %}
    </ul>

    <p class="text-xs text-gray-600">
        After you've saved them, refresh this page to see your security settings.
    </p>

    <button type="button"
            onclick="window.location.reload()"
            class="px-4 py-2 text-sm font-medium rounded-md text-gray-700 bg-gray-100 hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-300">
        I've saved my codes
    </button>
</div>
