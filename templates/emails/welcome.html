<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Welcome to {{ org_name }}</title></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; max-width: 560px; margin: 40px auto; padding: 0 20px; color: #1f2937;">
    <h1 style="font-size: 20px; margin-bottom: 16px;">Welcome to {{ org_name }}!</h1>
    <p>Hi {{ full_name }},</p>
    <p>Your membership has been activated. You can now log in and access member-only content.</p>
    <p style="margin: 28px 0;">
        <a href="{{ portal_url }}" style="background:#2563eb;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block;">Open portal</a>
    </p>
    <p style="font-size: 13px; color: #6b7280;">— {{ org_name }}</p>
</body>
</html>
