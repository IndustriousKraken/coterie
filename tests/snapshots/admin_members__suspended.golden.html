<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Member Management - Coterie Admin</title>
    
    <!-- HTMX (pinned + SRI) -->
    <script nonce="__CSP_NONCE__"
            src="https://unpkg.com/htmx.org@1.9.10"
            integrity="sha384-YwQSRkoBOUtKKVfHQ8C2zCPslUZHuxiPHts6X/xQCuGHipTtRXd7ImqS1VTLlpiT"
            crossorigin="anonymous"></script>
    <script nonce="__CSP_NONCE__"
            src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"
            integrity="sha384-nRnAvEUI7N/XvvowiMiq7oEI04gOXMCqD3Bidvedw+YNbj7zTQACPlRI3Jt3vYM4"
            crossorigin="anonymous"></script>

    <!-- Alpine.js (CSP build — no `Function()` so works without 'unsafe-eval') -->

            defer
            src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.csp.min.js"
            integrity="sha384-qZ7VE99GohFZdSLmj9//6HiHLNWo5eOEs1RrcdDXTygxJB4VAuCIBei06IJemclm"

    <!-- Tailwind CSS (locally built) -->

    <!-- Custom styles -->
    <style>
        [x-cloak] { display: none !important; }

        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
    </style>
    
    
<meta name="csrf-token" content="">

</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-semibold text-gray-900">
                        Coterie
                    </a>
                    
                    
                </div>
                
                <div class="flex items-center">
                    
                    <a href="/login" class="text-sm text-gray-700 hover:text-gray-900">
                        Login
                    </a>
                    
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Toast notifications -->
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    

    <!-- Main content -->
    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        
<div class="px-4 py-6">
    <div class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Member Management</h1>
            <p class="mt-1 text-sm text-gray-600">1 total members</p>
        </div>
        <div class="flex items-center gap-2">
            <!-- Download CSV. A small GET form (rather than a link with a
                 templated query string) so Askama can stamp in the active
                 filters via hidden inputs without manual ?key=value
                 stitching, and so empty filters don't appear in the URL. -->
            <form action="/portal/admin/members/export" method="get">
                
                
                
                <button type="submit"
                        class="inline-flex items-center px-3 py-2 border border-gray-300 text-sm text-gray-700 rounded-md hover:bg-gray-50">
                    <svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                    </svg>
                    Download CSV
                </button>
            </form>
            <a href="/portal/admin/members/new"
               class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">
                Add Member
            </a>
        </div>
    </div>

    <!-- Search and Filters -->
    <div class="bg-white rounded-lg shadow-sm p-4 mb-6">
        <form hx-get="/portal/admin/members"
              hx-target="#members-table-container"
              hx-push-url="true"
              class="flex flex-wrap gap-4 items-end">
            <input type="hidden" name="sort" value="name">
            <input type="hidden" name="order" value="asc">
            <div class="flex-1 min-w-[200px]">
                <label for="search" class="block text-sm font-medium text-gray-700">Search</label>
                <input type="text"
                       id="search"
                       name="q"
                       value=""
                       placeholder="Name, email, or username..."
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div>
                <label for="status" class="block text-sm font-medium text-gray-700">Status</label>
                <select id="status"
                        name="status"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">All Statuses</option>
                    <option value="Active" >Active</option>
                    <option value="Pending" >Pending</option>
                    <option value="Expired" >Expired</option>
                    <option value="Suspended" >Suspended</option>
                    <option value="Honorary" >Honorary</option>
                </select>
            </div>
            <div>
                <label for="type" class="block text-sm font-medium text-gray-700">Type</label>
                <select id="type"
                        name="type"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">All Types</option>
                    
                    <option value="regular" >Regular</option>
                    
                </select>
            </div>
            <button type="submit"
                    class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 text-sm font-medium">
                Filter
            </button>
            
        </form>
    </div>

    <!-- Members Table -->
    <div id="members-table-container" class="bg-white rounded-lg shadow-sm overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        <a href="?sort=name&order=desc"
                           class="flex items-center hover:text-gray-700 cursor-pointer">
                            Member<span class="ml-1">▲</span>
                        </a>
                    </th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        <a href="?sort=status&order=asc"
                           class="flex items-center hover:text-gray-700 cursor-pointer">
                            Status
                        </a>
                    </th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        <a href="?sort=type&order=asc"
                           class="flex items-center hover:text-gray-700 cursor-pointer">
                            Type
                        </a>
                    </th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        <a href="?sort=joined&order=asc"
                           class="flex items-center hover:text-gray-700 cursor-pointer">
                            Joined
                        </a>
                    </th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        <a href="?sort=dues&order=asc"
                           class="flex items-center hover:text-gray-700 cursor-pointer">
                            Dues Until
                        </a>
                    </th>
                    <th scope="col" class="relative px-6 py-3">
                        <span class="sr-only">Actions</span>
                    </th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 h-10 w-10 bg-gray-200 rounded-full flex items-center justify-center">
                                <span class="text-gray-600 font-medium text-sm">JD</span>
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">Jane Doe</div>
                                <div class="text-sm text-gray-500">jane@example.com</div>
                                <div class="text-xs text-gray-400">@jdoe</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">Suspended</span>
                        
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        Regular
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        Sep 12, 2025
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        
                            Mar 01, 2026
                        
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <div x-data="{ open: false }" class="relative inline-block text-left">
                            <button @click="open = !open"
                                    type="button"
                                    class="text-gray-400 hover:text-gray-600">
                                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"/>
                                </svg>
                            </button>
                            <div x-show="open"
                                 @click.away="open = false"
                                 x-transition
                                 class="origin-top-right absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-10">
                                <div class="py-1">
                                    <a href="/portal/admin/members/11111111-2222-3333-4444-555555555555"
                                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                        View Details
                                    </a>
                                    
                                    
                                    
                                    <button hx-post="/portal/admin/members/11111111-2222-3333-4444-555555555555/activate"
                                            hx-target="closest tr"
                                            hx-swap="outerHTML"
                                            class="block w-full text-left px-4 py-2 text-sm text-green-700 hover:bg-gray-100">
                                        Reactivate
                                    </button>
                                    
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                
            </tbody>
        </table>

        
    </div>
</div>

    </main>
    
    <!-- Loading indicator -->
    <div class="htmx-indicator fixed top-0 left-0 right-0 h-1 bg-blue-600"></div>
    
    <!-- Global scripts -->
    <script nonce="__CSP_NONCE__">
        // HTMX configuration
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-Requested-With'] = 'XMLHttpRequest';

            // Add CSRF token from meta tag if present
            const csrfMeta = document.querySelector('meta[name="csrf-token"]');
            if (csrfMeta) {
                event.detail.headers['X-CSRF-Token'] = csrfMeta.content;
            }
        });
        
        // Handle HTMX errors
        document.body.addEventListener('htmx:responseError', (event) => {
            console.error('HTMX error:', event.detail);
            showToast('An error occurred. Please try again.', 'error');
        });
        
        // Toast notifications
        function showToast(message, type = 'info') {
            const colors = {
                'info': 'bg-blue-500',
                'success': 'bg-green-500',
                'error': 'bg-red-500',
                'warning': 'bg-yellow-500'
            };
            
            const toast = document.createElement('div');
            toast.className = `${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg mb-2`;
            toast.textContent = message;
            
            document.getElementById('toast-container').appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 5000);
        }
        
        // Listen for server-sent events for notifications
        document.body.addEventListener('htmx:afterSwap', (event) => {
            if (event.detail.xhr.getResponseHeader('X-Toast')) {
                const toast = JSON.parse(event.detail.xhr.getResponseHeader('X-Toast'));
                showToast(toast.message, toast.type);
            }
        });
    </script>
    
    
</body>
</html>
