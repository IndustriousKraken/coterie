<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Add New Member - Coterie Admin</title>
    
    <!-- HTMX (pinned + SRI) -->
    <script nonce="__CSP_NONCE__"
            src="https://unpkg.com/htmx.org@1.9.10"
            integrity="sha384-YwQSRkoBOUtKKVfHQ8C2zCPslUZHuxiPHts6X/xQCuGHipTtRXd7ImqS1VTLlpiT"
            crossorigin="anonymous"></script>
    <script nonce="__CSP_NONCE__"
            src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"
            integrity="sha384-nRnAvEUI7N/XvvowiMiq7oEI04gOXMCqD3Bidvedw+YNbj7zTQACPlRI3Jt3vYM4"
            crossorigin="anonymous"></script>

    <!-- Alpine.js (CSP build — no `Function()` so works without 'unsafe-eval') -->
    <script nonce="__CSP_NONCE__"
            defer
            src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.csp.min.js"
            integrity="sha384-qZ7VE99GohFZdSLmj9//6HiHLNWo5eOEs1RrcdDXTygxJB4VAuCIBei06IJemclm"
            crossorigin="anonymous"></script>

    <!-- Tailwind CSS (locally built) -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Custom styles -->
    <style>
        [x-cloak] { display: none !important; }

        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
    </style>
    
    
<meta name="csrf-token" content="">

</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-semibold text-gray-900">
                        Coterie
                    </a>
                    
                    
                </div>
                
                <div class="flex items-center">
                    
                    <a href="/login" class="text-sm text-gray-700 hover:text-gray-900">
                        Login
                    </a>
                    
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Toast notifications -->
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    

    <!-- Main content -->
    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        
<div class="px-4 py-6">
    <!-- Header -->
    <div class="mb-6">
        <div class="flex items-center gap-2 text-sm text-gray-500 mb-2">
            <a href="/portal/admin/members" class="hover:text-gray-700">Members</a>
            <span>/</span>
            <span>Add New Member</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Add New Member</h1>
        <p class="mt-1 text-gray-600">Create a new member account</p>
    </div>

    <div class="max-w-2xl">
        <div class="bg-white rounded-lg shadow-sm">
            <form action="/portal/admin/members/new" method="post" class="p-6 space-y-6">
                <input type="hidden" name="csrf_token" value="">

                <!-- Account Information -->
                <div>
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Account Information</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                                Email <span class="text-red-500">*</span>
                            </label>
                            <input type="email"
                                   id="email"
                                   name="email"
                                   required
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="member@example.com">
                        </div>
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                                Username <span class="text-red-500">*</span>
                            </label>
                            <input type="text"
                                   id="username"
                                   name="username"
                                   required
                                   pattern="[a-zA-Z0-9_]+"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="username">
                            <p class="text-xs text-gray-400 mt-1">Letters, numbers, and underscores only</p>
                        </div>
                        <div class="md:col-span-2">
                            <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">
                                Full Name <span class="text-red-500">*</span>
                            </label>
                            <input type="text"
                                   id="full_name"
                                   name="full_name"
                                   required
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="Jane Doe">
                        </div>
                        <div class="md:col-span-2">
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                                Password <span class="text-red-500">*</span>
                            </label>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   required
                                   minlength="10"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="Min 10 chars, upper + lower + number">
                            <p class="text-xs text-gray-400 mt-1">Member can change this after logging in</p>
                        </div>
                    </div>
                </div>

                <!-- Membership Details -->
                <div class="pt-4 border-t">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Membership Details</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="membership_type" class="block text-sm font-medium text-gray-700 mb-1">
                                Membership Type
                            </label>
                            <select id="membership_type_id"
                                    name="membership_type_id"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                
                                <option value="00000000-0000-0000-0000-000000000001">Regular</option>
                                
                            </select>
                        </div>
                        <div>
                            <label for="status" class="block text-sm font-medium text-gray-700 mb-1">
                                Initial Status
                            </label>
                            <select id="status"
                                    name="status"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="Pending">Pending (awaiting payment)</option>
                                <option value="Active">Active</option>
                                <option value="Honorary">Honorary (no dues required)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Admin Notes -->
                <div class="pt-4 border-t">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Admin Notes</h2>
                    <div>
                        <textarea id="notes"
                                  name="notes"
                                  rows="3"
                                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                  placeholder="Internal notes about this member..."></textarea>
                        <p class="text-xs text-gray-400 mt-1">Include "ADMIN" to grant admin privileges</p>
                    </div>
                </div>

                <!-- Actions -->
                <div class="pt-4 border-t flex justify-between items-center">
                    <a href="/portal/admin/members"
                       class="px-4 py-2 text-gray-600 hover:text-gray-800">
                        Cancel
                    </a>
                    <button type="submit"
                            class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 font-medium">
                        Create Member
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

    </main>
    
    <!-- Loading indicator -->
    <div class="htmx-indicator fixed top-0 left-0 right-0 h-1 bg-blue-600"></div>
    
    <!-- Global scripts -->
    <script nonce="__CSP_NONCE__">
        // HTMX configuration
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-Requested-With'] = 'XMLHttpRequest';

            // Add CSRF token from meta tag if present
            const csrfMeta = document.querySelector('meta[name="csrf-token"]');
            if (csrfMeta) {
                event.detail.headers['X-CSRF-Token'] = csrfMeta.content;
            }
        });
        
        // Handle HTMX errors
        document.body.addEventListener('htmx:responseError', (event) => {
            console.error('HTMX error:', event.detail);
            showToast('An error occurred. Please try again.', 'error');
        });
        
        // Toast notifications
        function showToast(message, type = 'info') {
            const colors = {
                'info': 'bg-blue-500',
                'success': 'bg-green-500',
                'error': 'bg-red-500',
                'warning': 'bg-yellow-500'
            };
            
            const toast = document.createElement('div');
            toast.className = `${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg mb-2`;
            toast.textContent = message;
            
            document.getElementById('toast-container').appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 5000);
        }
        
        // Listen for server-sent events for notifications
        document.body.addEventListener('htmx:afterSwap', (event) => {
            if (event.detail.xhr.getResponseHeader('X-Toast')) {
                const toast = JSON.parse(event.detail.xhr.getResponseHeader('X-Toast'));
                showToast(toast.message, toast.type);
            }
        });
    </script>
    
    
</body>
</html>
