<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Dashboard - Coterie</title>
    
    <!-- HTMX (pinned + SRI) -->
    <script nonce="__CSP_NONCE__"
            src="https://unpkg.com/htmx.org@1.9.10"
            integrity="sha384-YwQSRkoBOUtKKVfHQ8C2zCPslUZHuxiPHts6X/xQCuGHipTtRXd7ImqS1VTLlpiT"
            crossorigin="anonymous"></script>
    <script nonce="__CSP_NONCE__"
            src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"
            integrity="sha384-nRnAvEUI7N/XvvowiMiq7oEI04gOXMCqD3Bidvedw+YNbj7zTQACPlRI3Jt3vYM4"
            crossorigin="anonymous"></script>

    <!-- Alpine.js (CSP build — no `Function()` so works without 'unsafe-eval') -->
    <script nonce="__CSP_NONCE__"
            defer
            src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.csp.min.js"
            integrity="sha384-qZ7VE99GohFZdSLmj9//6HiHLNWo5eOEs1RrcdDXTygxJB4VAuCIBei06IJemclm"
            crossorigin="anonymous"></script>

    <!-- Tailwind CSS (locally built) -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Custom styles -->
    <style>
        [x-cloak] { display: none !important; }

        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
    </style>
    
    
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-semibold text-gray-900">
                        Coterie
                    </a>
                    
                    
                </div>
                
                <div class="flex items-center">
                    
                    <a href="/login" class="text-sm text-gray-700 hover:text-gray-900">
                        Login
                    </a>
                    
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Toast notifications -->
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    

    <!-- Main content -->
    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        
<div class="px-4 py-6">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Welcome, Jane Doe!</h1>
        <p class="mt-2 text-sm text-gray-600">Member since September 12, 2025</p>
    </div>

    <!-- Member Status Card -->
    <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4">Membership Status</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <p class="text-sm text-gray-600">Status</p>
                <p class="text-lg font-medium">
                    
                        <span class="text-green-600">● Active</span>
                    
                </p>
            </div>
            <div>
                <p class="text-sm text-gray-600">Membership Type</p>
                <p class="text-lg font-medium">Regular</p>
            </div>
            <div>
                <p class="text-sm text-gray-600">Dues Paid Until</p>
                <p class="text-lg font-medium">
                    
                        March 01, 2026
                    
                </p>
            </div>
        </div>
        
        
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Upcoming Events -->
        <div class="bg-white rounded-lg shadow-sm p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold">Upcoming Events</h2>
                <a href="/portal/events" class="text-sm text-blue-600 hover:text-blue-800">View all →</a>
            </div>
            
            <div id="upcoming-events" 
                 hx-get="/portal/api/events/upcoming"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <div class="animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                    <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                </div>
            </div>
        </div>

        <!-- Recent Payments -->
        <div class="bg-white rounded-lg shadow-sm p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold">Recent Payments</h2>
                <a href="/portal/payments" class="text-sm text-blue-600 hover:text-blue-800">View all →</a>
            </div>
            
            <div id="recent-payments"
                 hx-get="/portal/api/payments/recent"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <div class="animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                    <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="mt-6 bg-white rounded-lg shadow-sm p-6">
        <h2 class="text-lg font-semibold mb-4">Quick Actions</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <a href="/portal/profile" 
               class="text-center p-4 border rounded-lg hover:bg-gray-50 transition">
                <svg class="w-8 h-8 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                <span class="text-sm">Edit Profile</span>
            </a>
            
            <a href="/portal/payments/new" 
               class="text-center p-4 border rounded-lg hover:bg-gray-50 transition">
                <svg class="w-8 h-8 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
                </svg>
                <span class="text-sm">Pay Dues</span>
            </a>
            
            <a href="/portal/events"
               class="text-center p-4 border rounded-lg hover:bg-gray-50 transition">
                <svg class="w-8 h-8 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <span class="text-sm">View Events</span>
            </a>
        </div>
    </div>
</div>

    </main>
    
    <!-- Loading indicator -->
    <div class="htmx-indicator fixed top-0 left-0 right-0 h-1 bg-blue-600"></div>
    
    <!-- Global scripts -->
    <script nonce="__CSP_NONCE__">
        // HTMX configuration
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-Requested-With'] = 'XMLHttpRequest';

            // Add CSRF token from meta tag if present
            const csrfMeta = document.querySelector('meta[name="csrf-token"]');
            if (csrfMeta) {
                event.detail.headers['X-CSRF-Token'] = csrfMeta.content;
            }
        });
        
        // Handle HTMX errors
        document.body.addEventListener('htmx:responseError', (event) => {
            console.error('HTMX error:', event.detail);
            showToast('An error occurred. Please try again.', 'error');
        });
        
        // Toast notifications
        function showToast(message, type = 'info') {
            const colors = {
                'info': 'bg-blue-500',
                'success': 'bg-green-500',
                'error': 'bg-red-500',
                'warning': 'bg-yellow-500'
            };
            
            const toast = document.createElement('div');
            toast.className = `${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg mb-2`;
            toast.textContent = message;
            
            document.getElementById('toast-container').appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 5000);
        }
        
        // Listen for server-sent events for notifications
        document.body.addEventListener('htmx:afterSwap', (event) => {
            if (event.detail.xhr.getResponseHeader('X-Toast')) {
                const toast = JSON.parse(event.detail.xhr.getResponseHeader('X-Toast'));
                showToast(toast.message, toast.type);
            }
        });
    </script>
    
    
<script nonce="__CSP_NONCE__">
    // Auto-refresh dashboard data every 30 seconds
    setInterval(() => {
        htmx.trigger('#upcoming-events', 'load');
        htmx.trigger('#recent-payments', 'load');
    }, 30000);
</script>

</body>
</html>
